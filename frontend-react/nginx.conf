server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: any unknown route serves index.html so React Router can
    # handle client-side routing (e.g. /dashboard, /predictor).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
